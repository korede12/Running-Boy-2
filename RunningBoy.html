<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Running Boy</title>
    <style>body { margin: 0; background: #000; overflow: hidden; }</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<script>
const GROUND_Y     = 330;
const TOTAL_FRAMES = 25;
const SCROLL_SPEED = 2;      // world scrolls left at this speed (px/frame)
const BOY_SCREEN_X = 110;    // boy's fixed screen x
const RAIN_ANGLE   = 0.25;
const TILE_W       = 411;    // building tile width (buildings span x=-5..406 = 411px)

const WALL_COLORS = [0x252030, 0x1e2838, 0x28221a, 0x1c2030, 0x2c1c1c, 0x1e2232];

// Buildings defined with relative window coords (rx = x offset within the tile)
const BUILDINGS = [
    { x:  -5, width: 55, height: 130 },
    { x:  42, width: 45, height: 100 },
    { x:  78, width: 60, height: 152 },
    { x: 128, width: 45, height: 115 },
    { x: 167, width: 65, height: 142 },
    { x: 222, width: 42, height:  95 },
    { x: 256, width: 55, height: 126 },
    { x: 302, width: 50, height: 138 },
    { x: 346, width: 60, height: 108 },
].map((b, i) => {
    const y     = GROUND_Y - b.height;
    const color = WALL_COLORS[i % WALL_COLORS.length];
    const WW = 8, WCOL = 15, WROW = 18;
    const cols   = Math.max(1, Math.floor((b.width  - 10) / WCOL));
    const rows   = Math.max(1, Math.floor((b.height - 22) / WROW));
    const startX = b.x + (b.width - (cols - 1) * WCOL - WW) / 2;
    const startY = y + 12;
    const windows = [];
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            windows.push({
                rx:  Math.round(startX + c * WCOL) - b.x, // relative to building x
                y:   Math.round(startY + r * WROW),
                lit: Math.random() > 0.4,
            });
        }
    }
    return { ...b, y, color, windows };
});

const LAMPPOST_RX = [100, 242, 376]; // lamppost x within a tile

// ─────────────────────────────────────────────────────────────────────────────
class Godzilla {
    constructor(scene) {
        this.scene     = scene;
        this.x         = 530;          // world x (starts off right of screen)
        this.speed     = 0.8;
        this.walkPhase = 0;
        this.state     = 'walking';
        this.stateTime = 3500;
        this.STOMP_DUR = 1000;
        this.gfx       = scene.add.graphics().setDepth(18);
        this.fireEmitter = null;
        this.dustEmitter = null;
        // Pre-allocated spike objects — mutated each draw instead of allocating per frame
        this._spikes = [
            {bx:0, by:0, h:28, w:12}, {bx:0, by:0, h:22, w:10},
            {bx:0, by:0, h:17, w: 9}, {bx:0, by:0, h:13, w: 8},
            {bx:0, by:0, h: 9, w: 6},
        ];
        this._spikeDx = [14, 16, 17, 18, 19];
        this._spikeDy = [-94, -79, -66, -53, -42];
    }

    initEmitters() {
        this.fireEmitter = this.scene.add.particles(0, 0, 'fire_particle', {
            lifespan: 550, speedX: { min: -420, max: -160 },
            speedY: { min: -65, max: 65 }, scale: { start: 1.2, end: 0 },
            alpha: { start: 0.9, end: 0 }, quantity: 4, frequency: 18,
        }).setDepth(32);
        this.fireEmitter.stop();

        this.dustEmitter = this.scene.add.particles(0, 0, 'dust_particle', {
            lifespan: 800, speedX: { min: -90, max: 90 },
            speedY: { min: -100, max: -30 }, gravityY: 220,
            scale: { start: 1.0, end: 0 }, alpha: { start: 0.6, end: 0 },
            quantity: 12, frequency: -1,
        }).setDepth(32);
    }

    update(dt, camX) {
        this.walkPhase += dt * 0.004;
        this.stateTime -= dt;

        if (this.state === 'walking') {
            this.x -= this.speed;
            if (this.stateTime <= 0) {
                Math.random() < 0.38 ? this._enterStomp() : this._enterAttack();
            }
        } else if (this.state === 'stomping') {
            if (this.stateTime <= 0) {
                this.state = 'walking';
                this.stateTime = Phaser.Math.Between(2500, 4500);
            }
        } else if (this.state === 'attacking') {
            this.x -= this.speed * 0.35;
            if (this.stateTime <= 0) {
                this.fireEmitter?.stop();
                this.state = 'walking';
                this.stateTime = Phaser.Math.Between(2000, 4000);
            }
        }

        // Recycle: when Godzilla scrolls off left edge, reset to right of camera
        if (this.x < camX - 160) {
            this.x = camX + 530;
            this.state = 'walking';
            this.stateTime = Phaser.Math.Between(3000, 5000);
            this.fireEmitter?.stop();
        }

        if (this.fireEmitter) {
            this.fireEmitter.setPosition(Math.round(this.x) - 63, GROUND_Y - 83);
        }

        this.gfx.clear();
        this._draw();
    }

    _enterStomp() {
        this.state = 'stomping';
        this.stateTime = this.STOMP_DUR;
        this.scene.time.delayedCall(520, () => {
            this.scene.cameras.main.shake(350, 0.011);
            this.dustEmitter?.explode(14, Math.round(this.x), GROUND_Y - 4);
        });
    }

    _enterAttack() {
        this.state = 'attacking';
        this.stateTime = Phaser.Math.Between(1800, 3000);
        this.fireEmitter?.start();
    }

    _draw() {
        const g    = this.gfx;
        const x    = Math.round(this.x);
        const base = GROUND_Y;
        const attacking = this.state === 'attacking';
        const stomping  = this.state === 'stomping';
        const stompProgress = stomping ? 1 - this.stateTime / this.STOMP_DUR : 0;
        const stompLift = stomping ? Math.sin(stompProgress * Math.PI) * 10 : 0;
        const slamming  = stomping && stompProgress > 0.5;
        const bodyColor = slamming ? 0x5a1818 : 0x2d5a1e;
        const darkColor = slamming ? 0x3d1010 : 0x1e4010;
        const bellyCol  = slamming ? 0x7a2828 : 0x3a7228;
        const lp      = Math.sin(this.walkPhase * 3);
        const legLOff = Math.round(lp *  5);
        const legROff = Math.round(-lp * 5);
        const jawDrop = attacking ? 10 + Math.sin(this.walkPhase * 9) * 3 : 0;
        const tailWag = Math.sin(this.walkPhase) * 5;

        g.fillStyle(0x000000, 0.22);
        g.fillEllipse(x, base - 2, 105, 18);

        g.fillStyle(darkColor, 1);
        g.beginPath();
        g.moveTo(x + 18, base - 35 - stompLift);
        g.lineTo(x + 50, base - 21 + tailWag);
        g.lineTo(x + 95, base - 10 + tailWag * 0.4);
        g.lineTo(x + 98, base - 16 + tailWag * 0.4);
        g.lineTo(x + 58, base - 29 + tailWag);
        g.lineTo(x + 24, base - 42 - stompLift);
        g.closePath(); g.fillPath();

        g.fillStyle(0x1a3812, 1);
        g.fillTriangle(x+90,base-13+tailWag*0.4, x+98,base-16+tailWag*0.4, x+105,base-9+tailWag*0.3);

        g.fillStyle(darkColor, 1);
        const rlTop = base - 30 + legROff - stompLift;
        g.fillRect(x + 2, rlTop, 18, base - rlTop);
        g.fillRect(x - 2, base - 7, 24, 7);

        g.fillStyle(bodyColor, 1);
        g.beginPath();
        g.moveTo(x - 34, base - 35 - stompLift); g.lineTo(x + 22, base - 35 - stompLift);
        g.lineTo(x + 18, base - 94 - stompLift); g.lineTo(x - 28, base - 92 - stompLift);
        g.closePath(); g.fillPath();

        g.fillStyle(bellyCol, 1);
        g.beginPath();
        g.moveTo(x - 14, base - 36 - stompLift); g.lineTo(x +  8, base - 36 - stompLift);
        g.lineTo(x +  6, base - 86 - stompLift); g.lineTo(x - 12, base - 85 - stompLift);
        g.closePath(); g.fillPath();

        g.fillStyle(bodyColor, 1);
        const llTop = base - 30 + legLOff - stompLift;
        g.fillRect(x - 28, llTop, 18, base - llTop);
        g.fillRect(x - 33, base - 7, 28, 7);
        g.fillStyle(darkColor, 1);
        g.fillTriangle(x-33,base-7, x-38,base+1, x-28,base-7);
        g.fillTriangle(x-21,base-7, x-23,base+1, x-16,base-7);
        g.fillTriangle(x- 8,base-7, x-10,base+1, x- 4,base-7);

        g.fillStyle(bodyColor, 1);
        g.fillRect(x-38, base-72-stompLift, 12, 28);
        g.fillRect(x-44, base-55-stompLift, 20,  8);
        g.fillStyle(darkColor, 1);
        g.fillRect(x+18, base-70-stompLift, 10, 22);
        g.fillRect(x+14, base-56-stompLift, 16,  7);

        const sb = base - stompLift;
        // Mutate pre-allocated spike objects instead of creating new array each frame
        for (let si = 0; si < 5; si++) {
            this._spikes[si].bx = x + this._spikeDx[si];
            this._spikes[si].by = sb + this._spikeDy[si];
        }
        g.fillStyle(0x1a3812, 1);
        for (let si = 0; si < 5; si++) {
            const s = this._spikes[si];
            g.fillTriangle(s.bx - s.w/2, s.by, s.bx + s.w/2, s.by, s.bx, s.by - s.h);
        }
        if (attacking) {
            const pulse = 0.15 + 0.12 * Math.sin(this.walkPhase * 10);
            g.fillStyle(0x00ff66, pulse);
            for (let si = 0; si < 3; si++) {
                g.fillCircle(this._spikes[si].bx, this._spikes[si].by - 4, 7);
            }
        }

        const hy = base - 92 - stompLift;
        g.fillStyle(bodyColor, 1);
        g.beginPath();
        g.moveTo(x-26,hy); g.lineTo(x+14,hy); g.lineTo(x+10,hy-13); g.lineTo(x-18,hy-12);
        g.lineTo(x-62,hy-3); g.lineTo(x-68,hy+5); g.lineTo(x-60,hy+9); g.lineTo(x-24,hy+4);
        g.closePath(); g.fillPath();

        g.fillStyle(darkColor, 1);
        g.beginPath();
        g.moveTo(x-18,hy-9); g.lineTo(x-60,hy-1); g.lineTo(x-60,hy+2); g.lineTo(x-18,hy-5);
        g.closePath(); g.fillPath();

        g.fillStyle(darkColor, 1);
        g.beginPath();
        g.moveTo(x-24,hy+4); g.lineTo(x-60,hy+9); g.lineTo(x-66,hy+13+jawDrop);
        g.lineTo(x-47,hy+17+jawDrop); g.lineTo(x-18,hy+12+jawDrop*0.4); g.lineTo(x-14,hy+7);
        g.closePath(); g.fillPath();

        const toothCount = attacking ? 5 : 3;
        const toothH     = attacking ? 7 : 4;
        g.fillStyle(0xd8d8b0, 1);
        for (let t = 0; t < toothCount; t++) {
            const tx = x - 61 + t * 10;
            g.fillTriangle(tx, hy+9, tx+8, hy+9, tx+4, hy+9+toothH);
        }
        if (attacking) {
            g.fillStyle(0xff6600, 0.35 + 0.15 * Math.sin(this.walkPhase * 8));
            g.beginPath();
            g.moveTo(x-62,hy+9); g.lineTo(x-18,hy+12); g.lineTo(x-47,hy+17+jawDrop);
            g.closePath(); g.fillPath();
        }

        const ex = x-46, ey = hy-1;
        g.fillStyle(0x00bb44, 0.35); g.fillCircle(ex, ey, 9);
        g.fillStyle(0x00ff77, 1);    g.fillCircle(ex, ey, 5);
        g.fillStyle(0x001100, 1);    g.fillCircle(ex-1, ey, 2);
    }
}

// ─────────────────────────────────────────────────────────────────────────────
class GameScene extends Phaser.Scene {

    preload() {
        for (let i = 0; i < TOTAL_FRAMES; i++) {
            const p = String(i).padStart(2,'0');
            this.load.image(`run_${p}`, `assets/skeleton-01_run_01start_${p}.png`);
        }
        for (let i = 0; i <= 20; i++) {
            const p = String(i).padStart(2,'0');
            this.load.image(`idle_${p}`, `assets/skeleton-00_idle_${p}.png`);
        }
    }

    create() {
        // ── Game state ────────────────────────────────────────────────────────
        this.isGameOver     = false;
        this.score          = 0;
        this.dodgeWindow    = false;
        this.dodgedInWindow = false;
        this.isCharging     = false;
        this.chargeStartTime = 0;

        this._makeTextures();

        // ── Fixed background layers (scrollFactor=0) ──────────────────────────
        this._drawSky();
        this._drawMoon();
        this._addStars();

        // ── Scrolling world (cleared + redrawn each frame) ────────────────────
        this.worldGfx = this.add.graphics().setDepth(5);

        // ── Fixed ground (scrollFactor=0, drawn OVER world so horizon is sharp) ─
        this._drawGround();

        // ── Godzilla (world space) ─────────────────────────────────────────────
        this.godzilla = new Godzilla(this);

        // ── Boy (fixed to screen) ─────────────────────────────────────────────
        this._addBoy();
        this._addBoyEffects();

        // ── Rain (fixed, atmospheric) ─────────────────────────────────────────
        this._addRain();

        // ── Fire / dust emitters (world space, highest depth so they clear rain)
        this.godzilla.initEmitters();

        // ── HUD ───────────────────────────────────────────────────────────────
        this._addUI();
    }

    // ── Texture generation ───────────────────────────────────────────────────
    _makeTextures() {
        // Free old generated textures before recreating — prevents GPU leak on restart
        ['raindrop', 'star', 'fire_particle', 'dust_particle'].forEach(k => {
            if (this.textures.exists(k)) this.textures.remove(k);
        });

        const rd = this.make.graphics({ add: false });
        rd.lineStyle(1, 0x99bbff, 0.8);
        rd.lineBetween(0, 0, Math.round(12 * RAIN_ANGLE), 12);
        rd.generateTexture('raindrop', Math.ceil(12 * RAIN_ANGLE) + 2, 14);
        rd.destroy();

        const sg = this.make.graphics({ add: false });
        sg.fillStyle(0xffffff, 1);
        sg.fillCircle(2, 2, 2);
        sg.generateTexture('star', 5, 5);
        sg.destroy();

        const fg = this.make.graphics({ add: false });
        fg.fillStyle(0xff5500, 0.25); fg.fillCircle(7,7,7);
        fg.fillStyle(0xff9900, 0.6);  fg.fillCircle(7,7,4);
        fg.fillStyle(0xffee00, 1);    fg.fillCircle(7,7,2);
        fg.generateTexture('fire_particle', 14, 14);
        fg.destroy();

        const dg = this.make.graphics({ add: false });
        dg.fillStyle(0xaaa090, 0.7); dg.fillCircle(4,4,4);
        dg.generateTexture('dust_particle', 9, 9);
        dg.destroy();
    }

    // ── Static layers (scrollFactor = 0) ─────────────────────────────────────
    _drawSky() {
        this.add.graphics().setScrollFactor(0).setDepth(0)
            .fillGradientStyle(0x04040e, 0x04040e, 0x16132e, 0x16132e, 1)
            .fillRect(0, 0, 400, GROUND_Y);
    }

    _drawMoon() {
        const mx = 338, my = 46, mr = 17;
        const gfx = this.add.graphics().setScrollFactor(0).setDepth(1);
        [40, 28, 16].forEach((r, i) => {
            gfx.fillStyle(0xc8e0ff, 0.04 + i * 0.03);
            gfx.fillCircle(mx, my, mr + r);
        });
        gfx.fillStyle(0xcddff5, 1);
        gfx.fillCircle(mx, my, mr);
    }

    _addStars() {
        for (let i = 0; i < 70; i++) {
            const star = this.add.image(
                Phaser.Math.Between(0, 400),
                Phaser.Math.Between(0, Math.floor(GROUND_Y * 0.65)),
                'star'
            )
            .setScrollFactor(0).setDepth(2)
            .setScale(Phaser.Math.FloatBetween(0.2, 0.9))
            .setAlpha(Phaser.Math.FloatBetween(0.3, 0.7));

            this.tweens.add({
                targets: star,
                alpha: { from: Phaser.Math.FloatBetween(0.1,0.4), to: Phaser.Math.FloatBetween(0.6,1.0) },
                duration: Phaser.Math.Between(800, 3000),
                yoyo: true, repeat: -1,
                delay: Phaser.Math.Between(0, 2500),
                ease: 'Sine.easeInOut',
            });
        }
    }

    // Fixed ground gradient + sheen (drawn over world so horizon is clean)
    _drawGround() {
        const gfx = this.add.graphics().setScrollFactor(0).setDepth(12);
        gfx.fillGradientStyle(0x10101e, 0x10101e, 0x08080e, 0x08080e, 1);
        gfx.fillRect(0, GROUND_Y, 400, 400 - GROUND_Y);
        gfx.lineStyle(1, 0x4664b4, 0.35);
        gfx.lineBetween(0, GROUND_Y, 400, GROUND_Y);
    }

    // ── World (buildings + lampposts + puddles, tiled, redrawn each frame) ───
    _updateWorld(camX) {
        const g = this.worldGfx;
        g.clear();

        // Which tile indices are visible?  Draw 3 tiles for safety.
        const tileStart = Math.floor(camX / TILE_W) - 1;

        for (let t = tileStart; t <= tileStart + 3; t++) {
            const off = t * TILE_W;  // world x offset for this tile

            // ── Building bodies ──────────────────────────────────────────────
            for (const b of BUILDINGS) {
                const bx = off + b.x;
                if (bx + b.width < camX - 10 || bx > camX + 410) continue;
                g.fillStyle(b.color, 1);
                g.fillRect(bx, b.y, b.width, b.height);
            }

            // ── Roofs ────────────────────────────────────────────────────────
            g.fillStyle(0x0a0a10, 1);
            for (const b of BUILDINGS) {
                const bx = off + b.x;
                if (bx + b.width < camX - 10 || bx > camX + 410) continue;
                g.fillTriangle(
                    bx - 2,             b.y,
                    bx + b.width / 2,   b.y - 24,
                    bx + b.width + 2,   b.y
                );
            }

            // ── Windows ──────────────────────────────────────────────────────
            for (const b of BUILDINGS) {
                const bx = off + b.x;
                if (bx + b.width < camX - 10 || bx > camX + 410) continue;
                for (const w of b.windows) {
                    if (w.lit) {
                        g.fillStyle(0xffcc55, 0.12);
                        g.fillRect(bx + w.rx - 3, w.y - 3, 14, 14);
                        g.fillStyle(0xffcc55, 1);
                    } else {
                        g.fillStyle(0x090c16, 1);
                    }
                    g.fillRect(bx + w.rx, w.y, 8, 8);
                }
            }

            // ── Lampposts + puddles ──────────────────────────────────────────
            for (const lrx of LAMPPOST_RX) {
                const topX = off + lrx + 12;
                const topY = GROUND_Y - 82;
                if (topX < camX - 60 || topX > camX + 460) continue;

                // Ambient halo
                [45, 30, 15].forEach((r, i) => {
                    g.fillStyle(0xffd250, 0.04 + i * 0.04);
                    g.fillCircle(topX, topY, r);
                });

                // Pole + arm
                g.lineStyle(2.5, 0x363646, 1);
                g.beginPath();
                g.moveTo(off + lrx, GROUND_Y);
                g.lineTo(off + lrx, topY);
                g.lineTo(topX, topY);
                g.strokePath();

                // Bulb
                g.fillStyle(0xffe070, 1);
                g.fillCircle(topX, topY, 4);

                // Puddle reflection
                [3, 2, 1].forEach(i => {
                    g.fillStyle(0xffc840, 0.04 * i);
                    g.fillEllipse(topX, GROUND_Y + 12, 70 / i, 18 / i);
                });
            }
        }
    }

    // ── Boy ──────────────────────────────────────────────────────────────────
    _addBoy() {
        const runFrames = Array.from({ length: TOTAL_FRAMES }, (_, i) => ({
            key: `run_${String(i).padStart(2,'0')}`,
        }));
        this.anims.create({ key: 'run', frames: runFrames, frameRate: 15, repeat: -1 });

        const idleFrames = Array.from({ length: 21 }, (_, i) => ({
            key: `idle_${String(i).padStart(2,'0')}`,
        }));
        this.anims.create({ key: 'idle', frames: idleFrames, frameRate: 12, repeat: -1 });

        this.boy = this.add.sprite(BOY_SCREEN_X, GROUND_Y, 'run_00')
            .setOrigin(0.5, 1)
            .setDisplaySize(50, 50)
            .setScrollFactor(0)
            .setDepth(20)
            .play('run');

        this.boyState  = 'running'; // 'running' | 'jumping' | 'hit' | 'dazed'
        this.boyVelX   = 0;
        this.boyVelY   = 0;
        this.boyAngle  = 0;
    }

    // ── Boy jump effects ─────────────────────────────────────────────────────
    _addBoyEffects() {
        // Dust burst used on takeoff and landing
        this.jumpDust = this.add.particles(BOY_SCREEN_X, GROUND_Y, 'dust_particle', {
            lifespan: 520,
            speedX: { min: -100, max: 100 },
            speedY: { min: -85, max: -10 },
            gravityY: 280,
            scale: { start: 1.4, end: 0 },
            alpha: { start: 0.75, end: 0 },
            quantity: 12,
            frequency: -1,
        }).setScrollFactor(0).setDepth(21);

        // Ghost trail sprites (sample the boy's position history while airborne)
        this.trailSprites = Array.from({ length: 5 }, () =>
            this.add.sprite(BOY_SCREEN_X, GROUND_Y, 'idle_00')
                .setOrigin(0.5, 1)
                .setDisplaySize(50, 50)
                .setScrollFactor(0)
                .setDepth(17)
                .setAlpha(0)
        );
        this.trailHistory = [];

        // Glow / aura (charge + airborne energy)
        this.boyGlow = this.add.graphics().setScrollFactor(0).setDepth(19);
    }

    // ── Rain ─────────────────────────────────────────────────────────────────
    _addRain() {
        this.add.particles(0, -20, 'raindrop', {
            x: { min: -30, max: 430 },
            speedX: { min: 50, max: 95 }, speedY: { min: 200, max: 380 },
            lifespan: 1800, frequency: 5, quantity: 2,
            alpha: { start: 0.55, end: 0.1 },
        }).setScrollFactor(0).setDepth(28);
    }

    // ── HUD ──────────────────────────────────────────────────────────────────
    _addUI() {
        const playerName = (() => {
            try { return (localStorage.getItem('runningboy_name') || '').toUpperCase(); } catch { return ''; }
        })();

        this.scoreText = this.add.text(10, 10, 'Score: 0', {
            fontSize: '16px', color: '#ffffff',
            fontFamily: 'monospace', stroke: '#000000', strokeThickness: 3,
        }).setScrollFactor(0).setDepth(50);

        if (playerName) {
            this.add.text(10, 30, playerName, {
                fontSize: '10px', color: '#4488aa',
                fontFamily: 'monospace', stroke: '#000000', strokeThickness: 2,
            }).setScrollFactor(0).setDepth(50);
        }

        const btnGfx = this.add.graphics().setScrollFactor(0).setDepth(50);
        btnGfx.fillStyle(0x112244, 0.85);
        btnGfx.fillRoundedRect(282, 368, 96, 24, 7);
        btnGfx.lineStyle(1.5, 0x4488ff, 0.8);
        btnGfx.strokeRoundedRect(282, 368, 96, 24, 7);

        this.add.text(330, 380, 'JUMP', {
            fontSize: '13px', color: '#88bbff',
            fontFamily: 'monospace', fontStyle: 'bold',
        }).setScrollFactor(0).setOrigin(0.5).setDepth(51);

        this.add.text(330, 360, 'hold to charge', {
            fontSize: '9px', color: '#445566', fontFamily: 'monospace',
        }).setScrollFactor(0).setOrigin(0.5).setDepth(51);

        this.chargeBar = this.add.graphics().setScrollFactor(0).setDepth(52);

        this.input.on('pointerdown', () => this._startJumpCharge());
        this.input.on('pointerup',   () => this._releaseJump());

        const spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
        spaceKey.on('down', () => this._startJumpCharge());
        spaceKey.on('up',   () => this._releaseJump());
    }

    // ── Jump ─────────────────────────────────────────────────────────────────
    _startJumpCharge() {
        if (this.isGameOver || this.boyState !== 'running' || this.isCharging) return;
        this.isCharging      = true;
        this.chargeStartTime = this.time.now;
    }

    _releaseJump() {
        if (!this.isCharging) return;
        this.isCharging = false;
        if (this.boyState !== 'running' || this.isGameOver) return;
        const t       = Math.min((this.time.now - this.chargeStartTime) / 700, 1);
        this.boyVelY  = Phaser.Math.Linear(-220, -530, t);
        this.boyState = 'jumping';
        this.boy.play('idle');
        this.chargeBar.clear();

        // Takeoff dust burst
        this.jumpDust.setPosition(BOY_SCREEN_X, GROUND_Y);
        this.jumpDust.explode(Math.round(8 + t * 10));

        // Stretch upward on launch (squish horizontally)
        const sx = this.boy.scaleX, sy = this.boy.scaleY;
        this.tweens.add({
            targets: this.boy,
            scaleX: sx * 0.68,
            scaleY: sy * 1.38,
            duration: 70,
            yoyo: true,
            ease: 'Power2',
            onComplete: () => { this.boy.scaleX = sx; this.boy.scaleY = sy; },
        });
    }

    // ── Collision result ─────────────────────────────────────────────────────
    _hitBoy() {
        if (this.isGameOver) return;
        this.isGameOver = true;
        this.isCharging = false;
        this.boyState   = 'hit';
        this.boyVelX    = -260;
        this.boyVelY    = -480;
        this.boyAngle   = 0;
        this.boy.setFlipX(true);
        this.boy.play('idle');
        this.cameras.main.shake(280, 0.014);
        this.cameras.main.flash(100, 255, 180, 80, false);
    }

    _landBoy() {
        this.boy.y    = GROUND_Y;
        this.boyVelX  = 0;
        this.boyVelY  = 0;
        this.boy.setAngle(0);
        this.boyState = 'dazed';
        this.boy.play('idle');
        this.time.delayedCall(600, () => this._gameOver());
    }

    _saveScore(score) {
        const LS_SCORES = 'runningboy_scores';
        const LS_NAME   = 'runningboy_name';
        try {
            const name   = (localStorage.getItem(LS_NAME) || 'ANON').toUpperCase();
            const scores = JSON.parse(localStorage.getItem(LS_SCORES)) || [];
            scores.push({ name, score });
            scores.sort((a, b) => b.score - a.score);
            localStorage.setItem(LS_SCORES, JSON.stringify(scores.slice(0, 20)));
        } catch (_) {}
    }

    _gameOver() {
        this._saveScore(this.score);

        const ol = this.add.graphics().setScrollFactor(0).setDepth(100);
        ol.fillStyle(0x000000, 0.75);
        ol.fillRect(0, 0, 400, 400);

        this.add.text(200, 120, 'GAME OVER', {
            fontSize: '30px', color: '#ff4444',
            fontFamily: 'monospace', fontStyle: 'bold',
            stroke: '#000', strokeThickness: 4,
        }).setScrollFactor(0).setOrigin(0.5).setDepth(101);

        this.add.text(200, 172, `Score: ${this.score}`, {
            fontSize: '22px', color: '#ffffff', fontFamily: 'monospace',
        }).setScrollFactor(0).setOrigin(0.5).setDepth(101);

        this.add.text(200, 240, 'Click or SPACE to restart', {
            fontSize: '12px', color: '#888888', fontFamily: 'monospace',
        }).setScrollFactor(0).setOrigin(0.5).setDepth(101);

        this.add.text(200, 290, '[ MENU ]', {
            fontSize: '12px', color: '#446688', fontFamily: 'monospace',
        }).setScrollFactor(0).setOrigin(0.5).setDepth(101)
          .setInteractive({ useHandCursor: true })
          .on('pointerover', function() { this.setColor('#88bbff'); })
          .on('pointerout',  function() { this.setColor('#446688'); })
          .on('pointerdown', () => { window.location.href = 'index.html'; });

        this.time.delayedCall(500, () => {
            this.input.once('pointerdown', () => this.scene.restart());
            this.input.keyboard.once('keydown', e => {
                if (e.key !== 'Escape') this.scene.restart();
            });
        });
    }

    _showScorePopup() {
        const popup = this.add.text(BOY_SCREEN_X, this.boy.y - 30, '+2', {
            fontSize: '22px', color: '#ffff44',
            fontFamily: 'monospace', fontStyle: 'bold',
            stroke: '#886600', strokeThickness: 3,
        }).setScrollFactor(0).setOrigin(0.5).setDepth(60);

        this.tweens.add({
            targets: popup, y: popup.y - 55, alpha: 0,
            duration: 1000, ease: 'Power2',
            onComplete: () => popup.destroy(),
        });
    }

    // ── Scene cleanup (called by Phaser on restart/stop) ─────────────────────
    shutdown() {
        // Clear trail buffer so objects can be GC'd
        this.trailHistory = [];
        // Godzilla gfx/emitters are on the scene's display list and destroyed automatically,
        // but null the reference so the Godzilla object itself can be collected.
        this.godzilla = null;
    }

    // ── Main loop ────────────────────────────────────────────────────────────
    update(_, delta) {
        const dt   = delta / 1000;
        const camX = this.cameras.main.scrollX;

        // Scroll the world left (camera moves right)
        this.cameras.main.scrollX += SCROLL_SPEED;

        // Always redraw the tiled world
        this._updateWorld(camX);

        // ── Hit arc continues even after game over ───────────────────────────
        if (this.boyState === 'hit') {
            this.boyVelY  += 900 * dt;
            this.boy.x    += this.boyVelX * dt;  // screen x moves (scrollFactor=0)
            this.boy.y    += this.boyVelY * dt;
            this.boyAngle += 380 * dt;
            this.boy.setAngle(this.boyAngle);
            if (this.boy.y >= GROUND_Y) this._landBoy();
        }

        if (this.isGameOver) {
            this.godzilla.update(delta, this.cameras.main.scrollX);
            return;
        }

        // ── Boy movement (screen space, scrollFactor=0) ──────────────────────
        if (this.boyState === 'running') {
            // Boy stays fixed at BOY_SCREEN_X — world scrolls instead
            this.boy.x = BOY_SCREEN_X;

        } else if (this.boyState === 'jumping') {
            this.boyVelY += 900 * dt;
            this.boy.y   += this.boyVelY * dt;
            this.boy.x    = BOY_SCREEN_X; // fixed horizontal
            if (this.boy.y >= GROUND_Y) {
                this.boy.y    = GROUND_Y;
                this.boyVelY  = 0;
                this.boyState = 'running';
                this.boy.play('run');
                this.trailHistory = [];

                // Landing dust burst
                this.jumpDust.setPosition(BOY_SCREEN_X, GROUND_Y);
                this.jumpDust.explode(8);

                // Squash on impact
                const sx = this.boy.scaleX, sy = this.boy.scaleY;
                this.tweens.add({
                    targets: this.boy,
                    scaleX: sx * 1.45,
                    scaleY: sy * 0.62,
                    duration: 55,
                    yoyo: true,
                    ease: 'Power2',
                    onComplete: () => { this.boy.scaleX = sx; this.boy.scaleY = sy; },
                });
                this.cameras.main.shake(80, 0.004);
            }
        }

        // ── Jump charge ──────────────────────────────────────────────────────
        if (this.isCharging && this.time.now - this.chargeStartTime >= 700) {
            this._releaseJump();
        }

        // ── Charge bar ───────────────────────────────────────────────────────
        this.chargeBar.clear();
        if (this.isCharging) {
            const t = Math.min((this.time.now - this.chargeStartTime) / 700, 1);
            this.chargeBar.fillStyle(0x112244, 0.85);
            this.chargeBar.fillRoundedRect(282, 350, 96, 14, 4);
            this.chargeBar.fillStyle(t > 0.7 ? 0xff4433 : 0x44aaff, 0.95);
            this.chargeBar.fillRoundedRect(282, 350, Math.round(96 * t), 14, 4);
        }

        // ── Charge glow + airborne aura ──────────────────────────────────────
        this.boyGlow.clear();
        if (this.isCharging) {
            const t = Math.min((this.time.now - this.chargeStartTime) / 700, 1);
            const cy = this.boy.y - 25;
            [38, 24, 13].forEach((r, i) => {
                this.boyGlow.fillStyle(0x44aaff, (0.025 + i * 0.04) * t);
                this.boyGlow.fillCircle(BOY_SCREEN_X, cy, r);
            });
        } else if (this.boyState === 'jumping') {
            const cy = this.boy.y - 25;
            const fade = Math.max(0, -this.boyVelY / 530); // brightest at peak velocity
            [28, 16].forEach((r, i) => {
                this.boyGlow.fillStyle(0xffffff, (0.06 + i * 0.06) * fade);
                this.boyGlow.fillCircle(BOY_SCREEN_X, cy, r);
            });
        }

        // ── Motion trail while airborne ──────────────────────────────────────
        const frameKey = this.boy.anims.currentFrame?.textureKey ?? 'idle_00';
        if (this.boyState === 'jumping') {
            this.trailHistory.push({ x: this.boy.x, y: this.boy.y, key: frameKey });
            if (this.trailHistory.length > 25) this.trailHistory.shift();
        }
        this.trailSprites.forEach((ts, i) => {
            const histIdx = this.trailHistory.length - 2 - i * 4;
            if (this.boyState === 'jumping' && histIdx >= 0) {
                const h = this.trailHistory[histIdx];
                ts.setPosition(h.x, h.y).setTexture(h.key);
                ts.setAlpha(0.22 - i * 0.04);
                ts.setTint(0x88ccff);
            } else {
                ts.setAlpha(0);
            }
        });

        // ── Godzilla (world space) — collision uses screen coords ────────────
        this.godzilla.update(delta, this.cameras.main.scrollX);

        // Godzilla's screen x = world x - camera scrollX
        const godzillaScreenX = this.godzilla.x - this.cameras.main.scrollX;
        const dx              = godzillaScreenX - BOY_SCREEN_X;
        const inDangerZone    = dx > -20 && dx < 90;

        // ── Dodge scoring ────────────────────────────────────────────────────
        if (!this.dodgeWindow && inDangerZone) {
            this.dodgeWindow    = true;
            this.dodgedInWindow = false;
        }
        if (this.dodgeWindow && inDangerZone && this.boyState === 'jumping') {
            this.dodgedInWindow = true;
        }
        if (this.dodgeWindow && !inDangerZone) {
            if (this.dodgedInWindow) {
                this.score += 2;
                this.scoreText.setText(`Score: ${this.score}`);
                this._showScorePopup();
            }
            this.dodgeWindow    = false;
            this.dodgedInWindow = false;
        }

        // ── Collision (ground only) ──────────────────────────────────────────
        if (this.boyState === 'running' && inDangerZone) {
            this._hitBoy();
        }
    }
}

// ─────────────────────────────────────────────────────────────────────────────
new Phaser.Game({
    type:            Phaser.AUTO,
    width:           400,
    height:          400,
    backgroundColor: '#000000',
    pixelArt:        true,
    scene:           GameScene,
    scale: {
        mode:       Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH,
    },
});
</script>
</body>
</html>
